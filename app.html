<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <section class="body">
    <div id="sobre">
      <h1>Invitación</h1>
    </div>
  </section>

 <script>
    const sobre = document.getElementById("sobre");

    sobre.addEventListener("click", () => {
      // al hacer clic, agrega la clase "arriba"
      sobre.classList.add("arriba");


    });
  </script>

</body>
</html>
